<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src data:;" />
  <title>AbleJam</title>
  <style>
    :root {
      --bg: #0b0b0c; --surface: #1c1c1f; --text: #f2f2f3; --muted: #9a9aa0;
      --border: #2a2a2e; --accent: #ff7a1a;
    }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg); color: var(--text); height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; user-select: none; -webkit-user-select: none;
      -webkit-app-region: drag; /* frameless window is draggable */
    }
    .mark { width: 96px; height: 96px; filter: drop-shadow(0 6px 24px rgba(0,0,0,.5)); }
    .word { font-size: 22px; font-weight: 800; letter-spacing: .5px; }
    .word .jam { color: var(--accent); }
    .bar { width: 220px; height: 3px; border-radius: 3px; background: var(--surface); overflow: hidden; }
    .bar > i {
      display: block; width: 35%; height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, #ff9a3a, var(--accent));
      animation: slide 1.1s ease-in-out infinite;
    }
    @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(320%); } }
    .cap { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <svg class="mark" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AbleJam">
    <defs>
      <linearGradient id="bgD" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#1c1c1f" /><stop offset="1" stop-color="#0b0b0c" />
      </linearGradient>
      <linearGradient id="clipD" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#ff9a3a" /><stop offset="1" stop-color="#ff5a00" />
      </linearGradient>
    </defs>
    <rect x="1" y="1" width="62" height="62" rx="15" fill="url(#bgD)" stroke="#2a2a2e" />
    <g fill="#41414a">
      <rect x="9" y="9" width="12" height="12" rx="3" />
      <rect x="26" y="9" width="12" height="12" rx="3" />
      <rect x="43" y="9" width="12" height="12" rx="3" />
      <rect x="9" y="26" width="12" height="12" rx="3" />
      <rect x="43" y="26" width="12" height="12" rx="3" />
      <rect x="9" y="43" width="12" height="12" rx="3" />
      <rect x="26" y="43" width="12" height="12" rx="3" />
      <rect x="43" y="43" width="12" height="12" rx="3" />
    </g>
    <rect x="26" y="26" width="12" height="12" rx="3" fill="url(#clipD)" />
  </svg>
  <div class="word">Able<span class="jam">Jam</span></div>
  <div class="bar"><i></i></div>
  <div class="cap">Avvio host AbleJam…</div>
</body>
</html>
