appId: com.ablejam.app
productName: AbleJam
copyright: AbleJam
# Custom URL scheme for one-click activation from the customer area (ablejam://activate?key=…).
protocols:
  - name: AbleJam
    schemes: [ablejam]
directories:
  output: release
  buildResources: build        # build/icon.ico + build/icon.icns auto-picked once added

asar: true
# @julusian/midi ships ABI-stable N-API v7 prebuilds — do NOT rebuild it from source
# (node-gyp needs Visual Studio on Windows / distutils on macOS, which CI runners lack).
# The prebuilt .node is used as-is and asarUnpacked below.
npmRebuild: false
# Native N-API addon must stay on disk so pkg-prebuilds can dlopen() it from app.asar.unpacked.
asarUnpack:
  - "**/*.node"
  - "node_modules/@julusian/midi/**"

files:
  - "dist/**"                                   # main.cjs, preload.cjs, splash.html, host/index.mjs (shared inlined), icon.png
  - "package.json"
  # esbuild externals must ship as REAL node_modules (loaded at runtime, not bundled):
  - "node_modules/@julusian/midi/**"
  - "node_modules/ws/**"
  - "node_modules/mammoth/**"
  - "node_modules/pdf-parse/**"                 # keep unminified; host requires pdf-parse/lib/pdf-parse.js
  - "!**/*.{ts,tsx,map,md,markdown}"
  - "!**/{test,__tests__,docs,example,examples}/**"

extraResources:                                 # land in resources/ next to app.asar -> process.resourcesPath
  - from: "../web/dist"                          # ABLEJAM_WEB_DIST -> resources/web
    to: "web"
  - from: "../../bridge"                         # Python control surface + bridge/install.ps1 ($PSScriptRoot-relative)
    to: "bridge"
    filter: ["**/*", "!**/__pycache__/**"]
  - from: "../../install.ps1"                    # top-level installer; expects installer/ + bridge/ as SIBLINGS
    to: "install.ps1"
  - from: "../../installer/loopMIDISetup.exe"    # loopMIDI driver installer (Windows)
    to: "installer/loopMIDISetup.exe"

win:
  target: ["nsis"]
  icon: "build/icon.ico"                         # AbleJam grid logo (generated by make-icon.mjs)
  # Keep this TRUE: rcedit must run to EMBED the icon + version info into AbleJam.exe (that's
  # what shows in the taskbar / Explorer). It does NOT sign — signing only happens when a
  # certificate is configured (none is), so the exe stays unsigned but correctly branded.
  signAndEditExecutable: true
nsis:
  oneClick: false
  perMachine: false                              # per-user install -> no UAC for the app itself
  allowToChangeInstallationDirectory: true
  installerIcon: "build/icon.ico"
  uninstallerIcon: "build/icon.ico"
  artifactName: "AbleJam-Setup-${version}.${ext}"

mac:
  target: ["dmg", "zip"]                         # zip allows right-click -> Open past Gatekeeper quarantine
  icon: "build/icon.png"                         # electron-builder generates the .icns from this 1024px master
  identity: null                                 # explicit: do NOT sign / notarize
  category: public.app-category.music
